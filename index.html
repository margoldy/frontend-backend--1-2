<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Карточка товара</title>
        <link rel="stylesheet" href="public/style.css">
    </head>
    <body>
        <div class="container">
            <article class="product-card">
                <div class="product-card--image" aria-hidden="true"></div>
                
                <div class="product-card--content">
                    <h2 class="product-card--title">Обычный градиент</h2>
                    <p class="product-card--desc">
                        Хорошая вещь, распродается быстро. 
                        Идеально подходит для написания кода без картинки.
                    </p>
                    <div class="product-card--footer">
                        <span class="product-card--price">0,01 ₽</span>
                        <button class="product-card--button">Купить</button>
                    </div>
                </div>
            </article>
        </div>
    </body>
</html>
